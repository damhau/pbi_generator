{% extends "base.html" %}
{% block title %}Register - PBI Generator{% endblock %}
{% block content %}
<div class="pbi-auth">
    <div class="pbi-auth__card">
        <div class="pbi-auth__logo">
            <div class="pbi-auth__logo-icon">
                <i class="bi bi-kanban-fill"></i>
            </div>
            <h1 class="pbi-auth__logo-title">Create Account</h1>
            <p class="pbi-auth__logo-sub">Set up your PBI Generator account</p>
        </div>

        <form method="POST">
            <div class="pbi-field">
                <label for="username" class="pbi-label">Username</label>
                <input type="text" class="pbi-input" id="username" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="pbi-field">
                <label for="email" class="pbi-label">Email</label>
                <input type="email" class="pbi-input" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="pbi-field">
                <label for="password" class="pbi-label">Password</label>
                <input type="password" class="pbi-input" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="pbi-field">
                <label for="confirm_password" class="pbi-label">Confirm Password</label>
                <input type="password" class="pbi-input" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
            </div>
            <div style="margin-top:1.5rem">
                <button type="submit" class="pbi-btn pbi-btn--primary pbi-btn--lg pbi-btn--block">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </div>
        </form>

        <hr class="pbi-auth__divider">
        <p class="pbi-auth__footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
