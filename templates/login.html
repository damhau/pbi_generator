{% extends "base.html" %}
{% block title %}Login - PBI Generator{% endblock %}
{% block content %}
<div class="pbi-auth">
    <div class="pbi-auth__card">
        <div class="pbi-auth__logo">
            <div class="pbi-auth__logo-icon">
                <i class="bi bi-kanban-fill"></i>
            </div>
            <h1 class="pbi-auth__logo-title">PBI Generator</h1>
            <p class="pbi-auth__logo-sub">Sign in to your account</p>
        </div>

        <form method="POST">
            <div class="pbi-field">
                <label for="username" class="pbi-label">Username</label>
                <input type="text" class="pbi-input" id="username" name="username" placeholder="Enter username" value="{{ request.args.get('username', '') }}" required autofocus>
            </div>
            <div class="pbi-field">
                <label for="password" class="pbi-label">Password</label>
                <input type="password" class="pbi-input" id="password" name="password" placeholder="Enter password" required>
            </div>
            <div style="margin-top:1.5rem">
                <button type="submit" class="pbi-btn pbi-btn--primary pbi-btn--lg pbi-btn--block">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </div>
        </form>

        <hr class="pbi-auth__divider">
        <p class="pbi-auth__footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
