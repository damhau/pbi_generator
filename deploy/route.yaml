apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: pbi-generator
  annotations:
    haproxy.router.openshift.io/timeout: 120s
  labels:
    app: pbi-generator
spec:
  to:
    kind: Service
    name: pbi-generator
    weight: 100
  port:
    targetPort: 5000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
